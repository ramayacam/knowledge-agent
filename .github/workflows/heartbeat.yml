name: Keep App Alive

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:          # Also lets you trigger it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}" ${{ secrets.APP_URL }}
          echo " — App pinged successfully"
